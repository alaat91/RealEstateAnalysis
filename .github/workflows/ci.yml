name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: realestate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d realestate_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/realestate_test
      SECRET_KEY: test-secret-key
      BACKEND_CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check app tests

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q
